version: "3.9"
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: leads
      POSTGRES_PASSWORD: leads
      POSTGRES_DB: leads
    ports: ["5432:5432"]
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U leads"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://leads:leads@db:5432/leads?sslmode=disable
      HTTP_ADDR: ":8080"
      QUEUE_WORKERS: "8"
    ports: ["8080:8080"]

volumes:
  pgdata:
